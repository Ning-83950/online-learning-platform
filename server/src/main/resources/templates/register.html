<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线学习平台 - 注册</title>
  <link rel="stylesheet" th:href="@{/assets/css/style.css}">
</head>
<body>
  <main class="auth-page">
    <section class="auth-visual">
      <h1>加入在线学习平台</h1>
      <p>注册后可以浏览课程、记录学习进度、提交作业测试并参与课程评价和讨论。</p>
    </section>
    <section class="auth-panel">
      <h2>账号注册</h2>
      <form>
        <div class="form-grid single-column">
          <div class="form-item"><label>用户名</label><input name="username"></div>
          <div class="form-item"><label>密码</label><input name="password" type="password"></div>
          <div class="form-item"><label>重复密码</label><input name="confirmPassword" type="password"></div>
          <div class="form-item"><label>姓名</label><input name="realName"></div>
          <div class="form-item"><label>角色</label><select name="role"><option value="STUDENT">学习者</option><option value="TEACHER">教师</option></select></div>
          <div class="form-item"><label>手机号</label><input name="phone"></div>
          <div class="form-item"><label>邮箱</label><input name="email"></div>
        </div>
      </form>
      <button class="primary-btn" onclick="register()">注册</button>
      <p class="muted"><a href="/login">返回登录</a></p>
      <p data-message class="muted"></p>
    </section>
  </main>
  <script th:src="@{/assets/js/auth.js}"></script>
</body>
</html>
