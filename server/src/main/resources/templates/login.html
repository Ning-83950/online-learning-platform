<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线学习平台 - 登录</title>
  <link rel="stylesheet" th:href="@{/assets/css/style.css}">
</head>
<body>
  <main class="auth-page">
    <section class="auth-visual">
      <h1>在线学习平台</h1>
      <p>汇聚课程学习、作业测试、教学互动和学习数据统计，帮助学习者、教师和管理员在同一平台完成完整教学流程。</p>
    </section>
    <section class="auth-panel">
      <h2>账号登录</h2>
      <p class="muted">支持用户名、手机号或邮箱登录</p>
      <div class="form-item">
        <label>账号</label>
        <input name="account" placeholder="请输入账号、手机号或邮箱">
      </div>
      <div class="form-item">
        <label>密码</label>
        <input name="password" type="password" placeholder="请输入密码">
      </div>
      <button class="primary-btn" onclick="login()">登录</button>
      <div class="quick-login">
        <button class="ghost-btn" onclick="quickLogin('admin','123456')">管理员登录</button>
        <button class="ghost-btn" onclick="quickLogin('teacher_li','123456')">教师登录</button>
        <button class="ghost-btn" onclick="quickLogin('student_chen','123456')">学习者登录</button>
      </div>
      <p class="muted"><a href="/register">注册账号</a>　<a href="/forgot-password">找回密码</a></p>
      <p data-message class="muted"></p>
    </section>
  </main>
  <script th:src="@{/assets/js/auth.js}"></script>
</body>
</html>
