<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线学习平台 - 管理后台</title>
  <link rel="stylesheet" th:href="@{/assets/css/style.css}">
</head>
<body class="admin-page">
  <div class="app-shell">
    <aside class="sidebar">
      <h1 class="brand">在线学习平台</h1>
      <button class="nav-btn active" data-module="dashboard">数据统计</button>
      <button class="nav-btn" data-module="users">用户管理</button>
      <button class="nav-btn" data-module="categories">课程分类</button>
      <button class="nav-btn" data-module="courses">课程审核</button>
      <button class="nav-btn" data-logout>退出登录</button>
    </aside>
    <main class="main" id="content"></main>
  </div>
  <div id="modal" class="modal-mask"></div>
  <script th:src="@{/assets/js/echarts.min.js}"></script>
  <script th:src="@{/assets/js/app.js}"></script>
  <script>initApp("dashboard");</script>
</body>
</html>
