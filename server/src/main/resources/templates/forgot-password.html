<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线学习平台 - 找回密码</title>
  <link rel="stylesheet" th:href="@{/assets/css/style.css}">
</head>
<body>
  <main class="auth-page">
    <section class="auth-visual">
      <h1>找回密码</h1>
      <p>通过用户名、手机号或邮箱定位账号，并设置新的登录密码。</p>
    </section>
    <section class="auth-panel">
      <h2>重置密码</h2>
      <form>
        <div class="form-item"><label>账号</label><input name="account" placeholder="用户名、手机号或邮箱"></div>
        <div class="form-item"><label>姓名</label><input name="realName" placeholder="请输入注册姓名"></div>
        <div class="form-item"><label>新密码</label><input name="newPassword" type="password"></div>
        <div class="form-item"><label>重复密码</label><input name="confirmPassword" type="password"></div>
      </form>
      <button class="primary-btn" onclick="forgotPassword()">确认重置</button>
      <p class="muted"><a href="/login">返回登录</a></p>
      <p data-message class="muted"></p>
    </section>
  </main>
  <script th:src="@{/assets/js/auth.js}"></script>
</body>
</html>
